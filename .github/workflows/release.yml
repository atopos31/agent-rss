name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NPM_SCOPE: atopos31

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            npm: darwin-arm64
            os: darwin
            cpu: arm64
          - goos: darwin
            goarch: amd64
            npm: darwin-x64
            os: darwin
            cpu: x64
          - goos: linux
            goarch: arm64
            npm: linux-arm64
            os: linux
            cpu: arm64
          - goos: linux
            goarch: amd64
            npm: linux-x64
            os: linux
            cpu: x64
          - goos: windows
            goarch: amd64
            npm: win32-x64
            os: win32
            cpu: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build binary
        run: |
          mkdir -p dist/bin
          EXT=""; [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o dist/bin/agent-rss${EXT} ./cmd/agent-rss
          [ "${{ matrix.goos }}" != "windows" ] && chmod +x dist/bin/agent-rss || true

      - name: Create npm package
        run: |
          cat > dist/package.json << 'EOF'
          {
            "name": "@${{ env.NPM_SCOPE }}/agent-rss-${{ matrix.npm }}",
            "version": "${{ steps.ver.outputs.VERSION }}",
            "description": "agent-rss binary for ${{ matrix.npm }}",
            "os": ["${{ matrix.os }}"],
            "cpu": ["${{ matrix.cpu }}"],
            "files": ["bin"],
            "license": "MIT"
          }
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm }}
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in artifacts/*/; do
            echo "Publishing ${dir}..."
            npm publish "${dir}" --access public || true
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/agent-rss
          VERSION=${{ steps.ver.outputs.VERSION }}

          # Update all versions
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = '${VERSION}';
            for (const k of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[k] = '${VERSION}';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
